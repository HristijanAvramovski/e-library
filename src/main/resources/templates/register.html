<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet"
        href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
        integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
        crossorigin="anonymous">
  <style>
    body{
      background-image: url("https://tailwindcss.com/_next/static/media/docs-dark@tinypng.1bbe175e.png");
    }
    </style>

</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
  <ul class="navbar-nav">
    <li class="nav-item">
      <a class="nav-link" href="/books/paginate/1">Books<span class="sr-only">(current)</span></a>
    </li>
    <li class="nav-item">
      <a th:href="@{'/books/showBooksByCategory'}" class="nav-link">Show books by category</a>
    </li>
    <li class="nav-item">
      <th:block th:if="${session.user} != null">
        <a th:href="@{'/logout'}" class="btn btn-link">Logout</a>
      </th:block>
      <th:block th:if="${session.user} == null">
        <a th:href="@{'/login'}" class="btn btn-link">Login</a>
      </th:block>
    </li>
  </ul>
</nav>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-sm-6">
        <form action="/register/save" method="POST">
          <div class="form-outline mb-4">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" class="form-control">
          </div>
          <div class="form-outline mb-4">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control"/>
          </div>
          <div class="form-outline mb-4">
            <label for="repeatPassword">Repeat password</label>
            <input type="password" name="repeatPassword" id="repeatPassword"  class="form-control">
          </div>
          <div class="form-outline mb-4">
            <label for="name">Name</label>
            <input type="text" name="name" class="form-control" id="name"/>
          </div>
          <div class="form-outline mb-4">
            <label for="surname">Surname</label>
            <input type="text" name="surname" id="surname"  class="form-control"/>
          </div>
          <div class="form-outline mb-4">
            <label>Role</label>
            User <input type="radio" name="role" value="ROLE_USER" />
            Admin <input type="radio" name="role" value="ROLE_ADMIN" />
          </div>
          <button type="submit" class="form-control btn btn-primary">Submit</button>
        </form>
    </div>
  </div>
</div>
</body>
</html>
