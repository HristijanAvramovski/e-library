<!DOCTYPE html>
<html  lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link rel="stylesheet"
          href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
          integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
          crossorigin="anonymous">
    <style>
    body{
      background-image: url("https://tailwindcss.com/_next/static/media/docs-dark@tinypng.1bbe175e.png");
    }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <ul class="navbar-nav">
        <li class="nav-item">
            <a class="nav-link" href="/books/paginate/1">Books<span class="sr-only">(current)</span></a>
        </li>
        <li class="nav-item">
            <a th:href="@{'/books/showBooksByCategory'}" class="nav-link">Show books by category</a>
        </li>
        <li class="nav-item">
            <a th:href="@{'/logout'}" class="btn btn-link">Logout</a>
        </li>
    </ul>
</nav>
<div class="container">
    <div class="row">
        <div class="col-md-5">
            <form action="/books/save" method="POST">
                <input id="id" type="hidden" name="id" th:value="(${book1} != null ? ${book1.getId()} : '')">
                <div class="form-group">
                    <label for="name">Book name</label>
                    <input type="text"
                           class="form-control"
                           id="name"
                           name="name"
                           th:value="(${book1} != null ? ${book1.getName()} : '')"
                           required
                           placeholder="Enter book name">
                </div>
                <select name="category" class="form-control">
                    <option>NOVEL</option>
                    <option>THRILER</option>
                    <option>BIOGRAPHY</option>
                    <option>HISTORY</option>
                    <option>DRAMA</option>
                    <option>CLASSICS</option>
                    <option>FANTASY</option>
                </select>
                <div class="form-group">
                    <label for="availableCopies">availableCopies</label>
                    <input type="text"
                           class="form-control"
                           id="availableCopies"
                           name="availableCopies"
                           th:value="(${book1} != null ? ${book1.getAvailableCopies()} : '')"
                           placeholder="availableCopies">
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <select name="authorId" class="form-control">
                        <option th:if="${book1} != null"
                                th:selected="${book1.getAuthor() != null &&
                                book1.getAuthor().getId() == author.getId()}"
                                th:each="author : ${authors}"
                                th:value="${author.getId()}"
                                th:text="${author.getName()}">
                        </option>
                        <option th:if="${book1} == null"
                                th:each="author : ${authors}"
                                th:value="${author.getId()}"
                                th:text="${author.getName()}">
                        </option>
                    </select>
                </div>
                <button id="submit" type="submit" class="btn btn-primary">Submit</button>
                <a type="button" class="btn btn-primary" href="/books/paginate/1">Back</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
